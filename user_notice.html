<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>নোটিশ বোর্ড</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f4f6f7; padding: 20px; color: #333; margin: 0; }
        .card { width: 90%; max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); border-top: 5px solid #e67e22; }
        h2 { color: #2c3e50; font-size: 18px; margin-bottom: 15px; text-align: center; }
        .notice-content { font-size: 15px; line-height: 1.8; color: #2c3e50; white-space: pre-wrap; word-wrap: break-word; background: #fff8f0; padding: 15px; border-radius: 8px; border: 1px solid #ffe0b2; }
        .date { font-size: 12px; color: #7f8c8d; text-align: right; margin-top: 10px; }
        .btn-back { display: inline-block; background-color: #34495e; color: white; padding: 8px 15px; text-decoration: none; border-radius: 6px; font-weight: bold; font-size: 14px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="card">
    <a href="index.html" class="btn-back">← ফিরে যান</a>
    <h2>📢 সর্বশেষ নোটিশ</h2>
    
    <div id="noticeDisplay" class="notice-content">লোড হচ্ছে...</div>
    <div id="noticeDate" class="date"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA_NQ7MQTKkQbvVXGAxUAAL9O50Z7OVOvw",
        authDomain: "gpa-calculation-710dc.firebaseapp.com",
        projectId: "gpa-calculation-710dc",
        storageBucket: "gpa-calculation-710dc.firebasestorage.app",
        messagingSenderId: "1092344384301",
        appId: "1:1092344384301:web:77350bd13958c125ac61a4",
        measurementId: "G-19E7DVEF4M"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    onValue(ref(db, 'notices/general'), (snapshot) => {
        const display = document.getElementById('noticeDisplay');
        const dateEl = document.getElementById('noticeDate');

        if(snapshot.exists()) {
            const data = snapshot.val();
            display.innerText = data.text;
            if(data.updatedAt) {
                dateEl.innerText = "সর্বশেষ আপডেট: " + data.updatedAt;
            }
        } else {
            display.innerText = "বর্তমানে কোনো নতুন নোটিশ নেই।";
            dateEl.innerText = "";
        }
    });
</script>

</body>
</html>
